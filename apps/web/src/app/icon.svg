<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="112" fill="#09090b"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" /> <!-- cyan-400 -->
      <stop offset="100%" stop-color="#4f46e5" /> <!-- indigo-600 -->
    </linearGradient>
  </defs>
  
  <!-- Subtle glowing background ring -->
  <circle cx="256" cy="256" r="190" stroke="url(#grad)" stroke-width="32" opacity="0.15" />
  
  <!-- Huge, bold checkmark extending to edges -->
  <path d="M140 260 L230 350 L390 170" stroke="url(#grad)" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" />
</svg>
